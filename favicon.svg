<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a1e"/>
      <stop offset="100%" style="stop-color:#0a0a0c"/>
    </radialGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3333"/>
      <stop offset="100%" style="stop-color:#cc0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" stroke="#333" stroke-width="6"/>
  <!-- Hexagon wireframe -->
  <polygon points="256,80 409,168 409,344 256,432 103,344 103,168"
    fill="none" stroke="url(#neon)" stroke-width="4" opacity="0.4" filter="url(#glow)"/>
  <!-- Network lines -->
  <line x1="256" y1="80" x2="256" y2="432" stroke="#ff3333" stroke-width="1.5" opacity="0.25"/>
  <line x1="103" y1="168" x2="409" y2="344" stroke="#ff3333" stroke-width="1.5" opacity="0.25"/>
  <line x1="103" y1="344" x2="409" y2="168" stroke="#ff3333" stroke-width="1.5" opacity="0.25"/>
  <!-- Node dots -->
  <circle cx="256" cy="80" r="8" fill="#ff4444" filter="url(#glow)"/>
  <circle cx="409" cy="168" r="8" fill="#ff4444" filter="url(#glow)"/>
  <circle cx="409" cy="344" r="8" fill="#ff4444" filter="url(#glow)"/>
  <circle cx="256" cy="432" r="8" fill="#ff4444" filter="url(#glow)"/>
  <circle cx="103" cy="344" r="8" fill="#ff4444" filter="url(#glow)"/>
  <circle cx="103" cy="168" r="8" fill="#ff4444" filter="url(#glow)"/>
  <!-- Letter A -->
  <g filter="url(#glow)">
    <polygon points="256,140 320,340 295,340 270,265 242,265 217,340 192,340"
      fill="none" stroke="url(#neon)" stroke-width="8" stroke-linejoin="round"/>
    <line x1="225" y1="280" x2="287" y2="280" stroke="url(#neon)" stroke-width="7"/>
  </g>
  <!-- Checkmark -->
  <polyline points="240,310 272,345 340,230"
    fill="none" stroke="#ff3333" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>
