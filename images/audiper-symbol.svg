<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e22"/>
      <stop offset="100%" style="stop-color:#141416"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e83030"/>
      <stop offset="100%" style="stop-color:#b81818"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>
  <!-- Subtle inner glow ring -->
  <circle cx="256" cy="256" r="236" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.06"/>
  <!-- < left bracket (red) -->
  <polyline points="198,170 128,256 198,342" fill="none" stroke="url(#redGrad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- / center slash (white) -->
  <line x1="240" y1="155" x2="272" y2="357" stroke="#ffffff" stroke-width="32" stroke-linecap="round"/>
  <!-- > right bracket (red) -->
  <polyline points="314,170 384,256 314,342" fill="none" stroke="url(#redGrad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
