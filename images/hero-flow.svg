<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
<style>
  /* Flow dot animations */
  @keyframes flowRight{0%{transform:translateX(-40px);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateX(300px);opacity:0}}
  @keyframes flowLeft{0%{transform:translateX(40px);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateX(-300px);opacity:0}}
  @keyframes flowDown{0%{transform:translateY(-30px);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(200px);opacity:0}}
  @keyframes pulse{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1.1)}}
  @keyframes dashFlow{0%{stroke-dashoffset:20}100%{stroke-dashoffset:0}}
  @keyframes fadeInOut{0%,100%{opacity:0.2}50%{opacity:0.8}}
  @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

  .flow-dot{animation:flowRight 4s linear infinite}
  .flow-dot2{animation:flowRight 5s linear infinite 1s}
  .flow-dot3{animation:flowLeft 4.5s linear infinite 0.5s}
  .flow-dot-down{animation:flowDown 3.5s linear infinite 0.3s}
  .pulse-node{animation:pulse 2.5s ease-in-out infinite}
  .pulse-node2{animation:pulse 3s ease-in-out infinite 0.8s}
  .pulse-node3{animation:pulse 2s ease-in-out infinite 1.5s}
  .dash-line{stroke-dasharray:8 6;animation:dashFlow 1.5s linear infinite}
  .dash-line2{stroke-dasharray:6 8;animation:dashFlow 2s linear infinite 0.5s}
  .fade-el{animation:fadeInOut 3s ease-in-out infinite}
  .fade-el2{animation:fadeInOut 4s ease-in-out infinite 1s}
  .spin-el{animation:spin 12s linear infinite;transform-origin:400px 250px}
  .float-el{animation:float 3s ease-in-out infinite}
  .float-el2{animation:float 4s ease-in-out infinite 1s}
  .float-el3{animation:float 3.5s ease-in-out infinite 0.5s}

  text{font-family:'JetBrains Mono',monospace;fill:#131318}
  .label{font-size:8px;fill:#999;letter-spacing:1.5px;text-transform:uppercase}
  .num{font-size:14px;font-weight:700;fill:#c41a1a}
  .num-sm{font-size:10px;font-weight:600;fill:#131318}
</style>

<!-- Background grid dots -->
<g opacity="0.06">
  <circle cx="40" cy="40" r="1.5"/><circle cx="80" cy="40" r="1.5"/><circle cx="120" cy="40" r="1.5"/><circle cx="160" cy="40" r="1.5"/><circle cx="200" cy="40" r="1.5"/><circle cx="240" cy="40" r="1.5"/><circle cx="280" cy="40" r="1.5"/><circle cx="320" cy="40" r="1.5"/><circle cx="360" cy="40" r="1.5"/><circle cx="400" cy="40" r="1.5"/><circle cx="440" cy="40" r="1.5"/><circle cx="480" cy="40" r="1.5"/><circle cx="520" cy="40" r="1.5"/><circle cx="560" cy="40" r="1.5"/><circle cx="600" cy="40" r="1.5"/><circle cx="640" cy="40" r="1.5"/><circle cx="680" cy="40" r="1.5"/><circle cx="720" cy="40" r="1.5"/><circle cx="760" cy="40" r="1.5"/>
  <circle cx="40" cy="80" r="1.5"/><circle cx="80" cy="80" r="1.5"/><circle cx="120" cy="80" r="1.5"/><circle cx="160" cy="80" r="1.5"/><circle cx="200" cy="80" r="1.5"/><circle cx="240" cy="80" r="1.5"/><circle cx="280" cy="80" r="1.5"/><circle cx="320" cy="80" r="1.5"/><circle cx="360" cy="80" r="1.5"/><circle cx="400" cy="80" r="1.5"/><circle cx="440" cy="80" r="1.5"/><circle cx="480" cy="80" r="1.5"/><circle cx="520" cy="80" r="1.5"/><circle cx="560" cy="80" r="1.5"/><circle cx="600" cy="80" r="1.5"/><circle cx="640" cy="80" r="1.5"/><circle cx="680" cy="80" r="1.5"/><circle cx="720" cy="80" r="1.5"/><circle cx="760" cy="80" r="1.5"/>
  <circle cx="40" cy="120" r="1.5"/><circle cx="80" cy="120" r="1.5"/><circle cx="120" cy="120" r="1.5"/><circle cx="160" cy="120" r="1.5"/><circle cx="200" cy="120" r="1.5"/><circle cx="240" cy="120" r="1.5"/><circle cx="280" cy="120" r="1.5"/><circle cx="320" cy="120" r="1.5"/><circle cx="360" cy="120" r="1.5"/><circle cx="400" cy="120" r="1.5"/><circle cx="440" cy="120" r="1.5"/><circle cx="480" cy="120" r="1.5"/><circle cx="520" cy="120" r="1.5"/><circle cx="560" cy="120" r="1.5"/><circle cx="600" cy="120" r="1.5"/><circle cx="640" cy="120" r="1.5"/><circle cx="680" cy="120" r="1.5"/><circle cx="720" cy="120" r="1.5"/><circle cx="760" cy="120" r="1.5"/>
  <circle cx="40" cy="160" r="1.5"/><circle cx="80" cy="160" r="1.5"/><circle cx="120" cy="160" r="1.5"/><circle cx="160" cy="160" r="1.5"/><circle cx="200" cy="160" r="1.5"/><circle cx="240" cy="160" r="1.5"/><circle cx="280" cy="160" r="1.5"/><circle cx="320" cy="160" r="1.5"/><circle cx="360" cy="160" r="1.5"/><circle cx="400" cy="160" r="1.5"/><circle cx="440" cy="160" r="1.5"/><circle cx="480" cy="160" r="1.5"/><circle cx="520" cy="160" r="1.5"/><circle cx="560" cy="160" r="1.5"/><circle cx="600" cy="160" r="1.5"/><circle cx="640" cy="160" r="1.5"/><circle cx="680" cy="160" r="1.5"/><circle cx="720" cy="160" r="1.5"/><circle cx="760" cy="160" r="1.5"/>
  <circle cx="40" cy="200" r="1.5"/><circle cx="80" cy="200" r="1.5"/><circle cx="120" cy="200" r="1.5"/><circle cx="160" cy="200" r="1.5"/><circle cx="200" cy="200" r="1.5"/><circle cx="240" cy="200" r="1.5"/><circle cx="280" cy="200" r="1.5"/><circle cx="320" cy="200" r="1.5"/><circle cx="360" cy="200" r="1.5"/><circle cx="400" cy="200" r="1.5"/><circle cx="440" cy="200" r="1.5"/><circle cx="480" cy="200" r="1.5"/><circle cx="520" cy="200" r="1.5"/><circle cx="560" cy="200" r="1.5"/><circle cx="600" cy="200" r="1.5"/><circle cx="640" cy="200" r="1.5"/><circle cx="680" cy="200" r="1.5"/><circle cx="720" cy="200" r="1.5"/><circle cx="760" cy="200" r="1.5"/>
  <circle cx="40" cy="240" r="1.5"/><circle cx="80" cy="240" r="1.5"/><circle cx="120" cy="240" r="1.5"/><circle cx="160" cy="240" r="1.5"/><circle cx="200" cy="240" r="1.5"/><circle cx="240" cy="240" r="1.5"/><circle cx="280" cy="240" r="1.5"/><circle cx="320" cy="240" r="1.5"/><circle cx="360" cy="240" r="1.5"/><circle cx="400" cy="240" r="1.5"/><circle cx="440" cy="240" r="1.5"/><circle cx="480" cy="240" r="1.5"/><circle cx="520" cy="240" r="1.5"/><circle cx="560" cy="240" r="1.5"/><circle cx="600" cy="240" r="1.5"/><circle cx="640" cy="240" r="1.5"/><circle cx="680" cy="240" r="1.5"/><circle cx="720" cy="240" r="1.5"/><circle cx="760" cy="240" r="1.5"/>
</g>

<!-- MAIN FLOW LINES (circuit-board style) -->
