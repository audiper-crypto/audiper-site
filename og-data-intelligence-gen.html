<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1200"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800;900&family=Fraunces:ital,opsz,wght@1,9..144,400;1,9..144,600&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1200px; height:630px; overflow:hidden;
  font-family:'Figtree',sans-serif;
  background:#111114;
  position:relative;
}

/* Grid bg */
.bg-grid {
  position:absolute; inset:0; z-index:0;
  background-image:
    linear-gradient(rgba(196,26,26,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(196,26,26,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* Background network */
.bg-network {
  position:absolute; inset:0; z-index:1;
  width:1200px; height:630px;
}

/* Red accent bar top */
.top-bar {
  position:absolute; top:0; left:0; right:0; height:5px; z-index:10;
  background: linear-gradient(90deg, #c41a1a 0%, #e32018 60%, #c41a1a 100%);
}

/* Content */
.content {
  position:relative; z-index:5;
  display:flex; height:100%;
  padding: 32px 40px 0;
}

/* Left - text */
.left {
  width:440px; display:flex; flex-direction:column; justify-content:center;
  padding-right:24px;
}

.logo-top {
  display:flex; flex-direction:column; align-items:flex-start; gap:12px; margin-bottom:18px;
}
.logo-top img { width:160px; height:160px; object-fit:contain; }
.badge {
  display:inline-block;
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:700;
  color:#fff; background:#c41a1a;
  padding:5px 14px; border-radius:4px;
  letter-spacing:2px; text-transform:uppercase;
}

.title {
  font-size:42px; font-weight:900; line-height:1.15;
  color:#fff; margin-bottom:14px;
}
.title .accent { color:#c41a1a; }
.title .italic-accent {
  font-family:'Fraunces',serif;
  font-style:italic; font-weight:600; color:#c41a1a;
}

.subtitle {
  font-family:'Inter',sans-serif;
  font-size:15px; line-height:1.7; color:rgba(255,255,255,0.5);
  margin-bottom:24px; max-width:440px;
}

/* Stats row */
.stats-row {
  display:flex; gap:0; border:1px solid rgba(196,26,26,0.2); border-radius:10px;
  overflow:hidden; background:rgba(196,26,26,0.04);
}
.stat-item {
  flex:1; text-align:center; padding:14px 12px;
  border-right:1px solid rgba(196,26,26,0.15);
}
.stat-item:last-child { border-right:none; }
.stat-number {
  font-family:'JetBrains Mono',monospace;
  font-size:22px; font-weight:700; color:#c41a1a;
}
.stat-label {
  font-family:'Inter',sans-serif;
  font-size:9px; color:rgba(255,255,255,0.35);
  text-transform:uppercase; letter-spacing:1.5px; margin-top:2px;
}

/* Right - department network */
.right {
  flex:1; display:flex; align-items:center; justify-content:flex-start;
  position:relative; margin-left:-100px; margin-top:-50px;
}

/* SVG network diagram */
.network-svg {
  width:900px; height:700px;
}

/* Central node */
.center-circle {
  fill:rgba(196,26,26,0.15); stroke:#c41a1a; stroke-width:2.5;
}
.center-label {
  font-family:'Figtree',sans-serif; font-size:13px; font-weight:800;
  fill:#c41a1a; text-anchor:middle; dominant-baseline:middle;
  letter-spacing:2px;
}
.center-sub {
  font-family:'JetBrains Mono',monospace; font-size:8px; font-weight:600;
  fill:rgba(196,26,26,0.6); text-anchor:middle; letter-spacing:1px;
}

/* Dept nodes */
.dept-circle {
  fill:rgba(255,255,255,0.06); stroke:rgba(196,26,26,0.4); stroke-width:1.5;
}
.dept-icon {
  font-family:'JetBrains Mono',monospace;
  font-size:14px; font-weight:700; text-anchor:middle; dominant-baseline:middle;
  fill:rgba(196,26,26,0.8);
}
.dept-label {
  font-family:'Figtree',sans-serif; font-size:10px; font-weight:700;
  fill:rgba(255,255,255,0.7); text-anchor:middle; letter-spacing:1px;
  text-transform:uppercase;
}
.dept-sub {
  font-family:'Inter',sans-serif; font-size:8px;
  fill:rgba(255,255,255,0.3); text-anchor:middle;
}

/* Connection lines */
.conn-line {
  stroke:rgba(196,26,26,0.25); stroke-width:1.5; fill:none;
}
.conn-line-dash {
  stroke:rgba(196,26,26,0.1); stroke-width:0.8; fill:none;
  stroke-dasharray:4,6;
}

/* Data flow dots */
.flow-dot {
  fill:#c41a1a; opacity:0.6;
}

/* Outer ring */
.outer-ring {
  fill:none; stroke:rgba(196,26,26,0.06); stroke-width:1;
  stroke-dasharray:3,8;
}

/* Glow effect */
.glow {
  fill:url(#nodeGlow);
}

/* Bottom bar */
.bottom-bar {
  position:absolute; bottom:0; left:0; right:0;
  padding:14px 56px;
  display:flex; align-items:center; justify-content:space-between;
  background:rgba(0,0,0,0.5);
  border-top:1px solid rgba(196,26,26,0.15);
  z-index:10;
}
.domain {
  font-family:'JetBrains Mono',monospace;
  font-size:13px; font-weight:600; color:rgba(255,255,255,0.35);
  letter-spacing:1px;
}
.cta {
  font-family:'Figtree',sans-serif;
  font-size:13px; font-weight:700; color:#c41a1a;
  letter-spacing:0.5px;
}
</style>
</head>
<body>

  <div class="top-bar"></div>

      <div class="logo-top">
        <img src="images/audilogo40.png" alt="AUDÍPER"/>

        Inteligência de<br>

      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-number">40+</div>

        <div class="stat-item">

        </div>
        <div class="stat-item">

        </div>
        <div class="stat-item">
          <div class="stat-number">6 Deps</div>
          <div class="stat-label">monitorados</div>
        </div>
      </div>
    </div>

    <!-- Right: Department Network SVG -->

      <svg class="network-svg" viewBox="0 0 620 480">
        <defs>
          <radialGradient id="nodeGlow">
            <stop offset="0%" stop-color="rgba(196,26,26,0.15)"/>
            <stop offset="100%" stop-color="rgba(196,26,26,0)"/>
          </radialGradient>
          <radialGradient id="centerGlow">
            <stop offset="0%" stop-color="rgba(196,26,26,0.2)"/>
            <stop offset="100%" stop-color="rgba(196,26,26,0)"/>
          </radialGradient>
        </defs>

        <!-- Outer decorative ring -->
        <ellipse class="outer-ring" cx="310" cy="240" rx="240" ry="200"/>
        <ellipse class="outer-ring" cx="310" cy="240" rx="280" ry="230" style="stroke-dasharray:2,12"/>

        <path class="conn-line" d="M310,240 Q380,140 430,100"/><!-- Comercial -->
