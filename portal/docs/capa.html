<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Capa do Dossiê — AUDIPER®</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        audiper: { red: '#B91C1C', darkred: '#7F1D1D', gold: '#c9a962', wine: '#722F37' },
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                        serif: ['Merriweather', 'Georgia', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        * {
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
            color-adjust: exact !important;
            margin: 0; padding: 0; box-sizing: border-box;
        }
        body { background-color: #E5E7EB; font-family: 'Inter', sans-serif; color: #334155; }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }

        .a4-page {
            width: 210mm; height: 297mm; min-height: 297mm; max-height: 297mm;
            margin: 10px auto; background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            position: relative; overflow: hidden;
            page-break-after: always;
        }
        .page-wrapper {
            width: 100%; height: 297mm;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        @media print {
            @page { size: A4 portrait; margin: 0; }
            html, body { width: 210mm; height: 297mm; margin: 0; padding: 0; background: white; }
            .a4-page { margin: 0; box-shadow: none; }
        }

        .cover-gradient-bar {
            height: 6px;
            background: linear-gradient(90deg, #7F1D1D 0%, #B91C1C 35%, #DC2626 65%, #7F1D1D 100%);
        }
        .cover-divider {
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #B91C1C 30%, #B91C1C 70%, transparent 100%);
        }
        .cover-divider-gold {
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, #c9a962 30%, #c9a962 70%, transparent 100%);
        }
    </style>
</head>

<body>

    <div class="a4-page">
        <div class="page-wrapper">

            <!-- Barra superior gradiente -->
            <div class="cover-gradient-bar"></div>

            <!-- Conteúdo da capa -->
            <div class="flex-1 flex flex-col items-center justify-between px-16 py-12">

                <!-- Bloco Superior: Logo + Nome da Firma -->
                <div class="text-center pt-8">
                    <div class="w-24 h-24 mx-auto rounded-full flex items-center justify-center overflow-hidden bg-white border-2 border-gray-200 shadow-lg mb-6">
                        <img src="https://www.audiper.com.br/novo-logo-audiper.png" alt="AUDIPER" style="width: 72px; height: 72px; object-fit: contain;">
                    </div>
                    <h1 class="text-3xl font-bold font-display text-gray-800 tracking-wide">AUDIPER<span class="text-audiper-red">®</span></h1>
                    <p class="text-sm text-gray-500 uppercase tracking-[0.2em] mt-1">Auditoria Independente</p>
                    <p class="text-xs text-gray-400 mt-1">CRC/PI 000023/O</p>
                </div>

                <!-- Divider -->
                <div class="w-full my-4">
                    <div class="cover-divider"></div>
                </div>

                <!-- Bloco Central: Título do Documento -->
                <div class="text-center">
                    <div class="inline-flex items-center gap-2 px-6 py-2 rounded-full mb-4" style="background: linear-gradient(135deg, #7F1D1D 0%, #B91C1C 100%);">
                        <i class="fas fa-folder-open text-white text-sm"></i>
                        <span class="text-white text-xs font-semibold uppercase tracking-wider">Dossiê de Auditoria</span>
                    </div>
                    <h2 class="text-2xl font-bold font-display text-gray-800 leading-tight">
                        PAPÉIS DE TRABALHO<br>
                        <span class="text-audiper-red">AUDITORIA INDEPENDENTE</span>
                    </h2>
                    <p class="text-xs text-gray-400 mt-2 uppercase tracking-wide">NBC TAs emitidas pelo CFC</p>
                </div>

                <!-- Divider gold -->
                <div class="w-3/4 my-4">
                    <div class="cover-divider-gold"></div>
                </div>

                <!-- Bloco de Dados -->
                <div class="w-full max-w-sm">
                    <div class="space-y-3">
                        <div class="flex justify-between items-center py-2 border-b border-gray-100">
                            <span class="text-[9px] text-gray-400 uppercase font-semibold tracking-wide">Cliente</span>
                            <span class="text-sm font-bold text-gray-800">[NOME DO CLIENTE]</span>
                        </div>
                        <div class="flex justify-between items-center py-2 border-b border-gray-100">
                            <span class="text-[9px] text-gray-400 uppercase font-semibold tracking-wide">CNPJ</span>
                            <span class="text-sm font-semibold text-gray-600 font-mono">[CNPJ]</span>
                        </div>
                        <div class="flex justify-between items-center py-2 border-b border-gray-100">
                            <span class="text-[9px] text-gray-400 uppercase font-semibold tracking-wide">Exercício</span>
                            <span class="text-sm font-semibold text-gray-600">[EXERCICIO]</span>
                        </div>
                        <div class="flex justify-between items-center py-2 border-b border-gray-100">
                            <span class="text-[9px] text-gray-400 uppercase font-semibold tracking-wide">Tipo</span>
                            <span class="text-sm font-semibold text-gray-600">[TIPO_AUDITORIA]</span>
                        </div>
                        <div class="flex justify-between items-center py-2">
                            <span class="text-[9px] text-gray-400 uppercase font-semibold tracking-wide">Código</span>
                            <span class="text-sm font-bold text-audiper-red font-mono">[CODIGO]</span>
                        </div>
                    </div>
                </div>

                <!-- Bloco Inferior: Local e Data -->
                <div class="text-center pb-4">
                    <div class="cover-divider-gold w-32 mx-auto mb-4"></div>
                    <p class="text-sm text-gray-600 font-serif">Teresina — Piauí</p>
                    <p class="text-sm text-gray-500 font-serif">[MES_ANO]</p>
                </div>

            </div>

            <!-- Barra inferior gradiente -->
            <div class="cover-gradient-bar"></div>

        </div>
    </div>

</body>
</html>
